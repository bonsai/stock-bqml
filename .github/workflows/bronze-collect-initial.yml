name: bronze-collect-initial
on:
  workflow_dispatch:  # 手動1回だけ実行
    inputs:
      days:
        description: "取得日数 (0=全期間)"
        default: "0"
        required: false

permissions:
  contents: write

jobs:
  bulk-collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: '**/requirements*.txt'

      - name: Install deps
        run: pip install -r bronze/ingest/requirements.txt google-cloud-bigquery

      - name: Bulk historical collect
        run: |
          DAYS="${{ inputs.days }}"
          [ "$DAYS" = "0" ] && DAYS=3650
          python bronze/ingest/collect.py --days "$DAYS"
        timeout-minutes: 30

      - name: Commit CSV data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bronze/ingest/data/
          git diff --cached --quiet || git commit -m "chore(bronze): bulk historical data $(date +%Y-%m-%d)"
          git push
