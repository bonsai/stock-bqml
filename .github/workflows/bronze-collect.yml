name: bronze-collect
on:
  schedule:
    - cron: "30 9 * * 1-5"  # JST 18:30 (月〜金、日本市場引け後)
  workflow_dispatch:         # 手動トリガー可
  push:
    paths:
      - 'bronze/ingest/collect.py'

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install yfinance pandas google-cloud-bigquery

      - name: Collect stock data
        run: |
          python bronze/ingest/collect.py \
            --days 5 \
            --interval 1d

      - name: Commit CSV data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bronze/ingest/data/
          git diff --cached --quiet || git commit -m "chore: daily stock data $(date +%Y-%m-%d)"
          git push
