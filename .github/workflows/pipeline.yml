name: pipeline
on:
  schedule:
    - cron: "30 9 * * 1-5"  # JST 18:30 月〜金 (日本引け後)
  workflow_dispatch:
  push:
    paths:
      - 'bronze/ingest/**'
      - 'silver/**'
      - 'gold/**'

permissions:
  contents: write

jobs:
  # ── Stage 1: データ収集 ──
  collect:
    runs-on: ubuntu-latest
    outputs:
      has_new_data: ${{ steps.check.outputs.has_new_data }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: '**/requirements*.txt'

      - name: Install deps
        run: pip install -r bronze/ingest/requirements.txt

      - name: Collect stock data
        id: collect
        run: python bronze/ingest/collect.py --days 5

      - name: Check new data
        id: check
        run: |
          git diff --cached --quiet && echo "has_new_data=false" >> $GITHUB_OUTPUT \
          || echo "has_new_data=true" >> $GITHUB_OUTPUT

      - name: Commit CSV data
        if: steps.check.outputs.has_new_data == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bronze/ingest/data/
          git commit -m "chore(bronze): daily data $(date +%Y-%m-%d)"
          git push

  # ── Stage 2: BQデプロイ (Silver + Gold) ──
  deploy:
    needs: collect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: '**/requirements*.txt'

      - name: Install deps
        run: pip install -r bronze/ingest/requirements.txt google-cloud-bigquery

      - name: Deploy to BigQuery (Silver → Gold)
        run: python gold/arena/deploy.py
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
          BQ_PROJECT: ${{ secrets.BQ_PROJECT || 'gen-lang-client-0315818888' }}

  # ── Stage 3: バックテスト ──
  backtest:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Save SA key & auth
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: |
          echo "$GCP_CREDENTIALS" > /tmp/gcp-key.json
          gcloud auth activate-service-account --key-file=/tmp/g...on

      - name: Run backtest accuracy
        run: |
          bq query --use_legacy_sql=false \
            --project_id=${{ secrets.BQ_PROJECT || 'gen-lang-client-0315818888' }} \
            "$(sed 's/{{project}}/${{ secrets.BQ_PROJECT || 'gen-lang-client-0315818888' }}/g' gold/reports/backtest_accuracy.sql)"
